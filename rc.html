<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Review – Stethbook</title>
  <link rel="icon" href="http://stethbook.com/wp-content/uploads/2025/07/cropped-Fevicon-3.png" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #3B9B7A;
      --green-dark: #2D8567;
      --green-light: rgba(59,155,122,0.12);
      --green-glow: rgba(59,155,122,0.25);
      --text-primary: #1E1E1E;
      --text-secondary: #5A5A5A;
      --text-muted: #9A9A9A;
      --border: rgba(59,155,122,0.15);
      --surface: #F0F6FD;
      --card-bg: #ffffff;
      --radius-lg: 28px;
      --radius-md: 16px;
      --radius-sm: 10px;
      --radius-pill: 100px;
    }

    body {
      font-family: 'Onest', sans-serif;
      background: #F0F6FD;
      min-height: 100vh;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .bg-canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 65% 55% at 10% 5%,  rgba(180,220,255,0.45) 0%, transparent 55%),
        radial-gradient(ellipse 55% 50% at 90% 10%, rgba(200,225,255,0.30) 0%, transparent 50%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(170,215,255,0.32) 0%, transparent 55%),
        radial-gradient(ellipse 50% 55% at 5%  90%, rgba(190,225,255,0.28) 0%, transparent 50%),
        linear-gradient(160deg, #F0F6FD 0%, #EAF3FB 40%, #E3EFF9 100%);
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0;
      animation: orbFloat 12s ease-in-out infinite;
    }
    .orb-1 { width: 460px; height: 460px; top: -140px; left: -120px; background: rgba(150,205,255,0.28); animation-delay: 0s; }
    .orb-2 { width: 380px; height: 380px; bottom: -100px; right: -90px; background: rgba(180,215,255,0.22); animation-delay: 4s; }
    .orb-3 { width: 300px; height: 300px; top: 42%; left: 52%; background: rgba(200,230,255,0.18); animation-delay: 8s; }
    @keyframes orbFloat {
      0%   { opacity: 0; transform: translate(0,0) scale(1); }
      20%  { opacity: 1; }
      50%  { transform: translate(18px,-18px) scale(1.04); }
      80%  { opacity: 1; }
      100% { opacity: 0; transform: translate(0,0) scale(1); }
    }

    /* ── Layout ── */
    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 44px 20px 48px;
      position: relative;
      z-index: 1;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 36px 28px 28px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.9) inset,
        0 24px 64px rgba(59,155,122,0.07),
        0 6px 24px rgba(0,0,0,0.05);
      border: 1px solid rgba(220,235,228,0.9);
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Biz Header ── */
    .biz-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 28px;
    }
    .biz-icon-wrap {
      margin-bottom: 18px;
    }
    .biz-icon {
      width: 76px; height: 76px;
      border-radius: 50%;
      background: linear-gradient(145deg, #3B9B7A, #2a7a5f);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(59,155,122,0.35), 0 2px 6px rgba(59,155,122,0.2);
      animation: iconFloat 4s ease-in-out infinite;
    }
    @keyframes iconFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }
    .biz-icon svg { width: 34px; height: 34px; stroke: #fff; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

    .biz-name {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.4px;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .biz-location {
      display: flex; align-items: center; gap: 5px;
      color: var(--text-muted); font-size: 13px; font-weight: 300;
    }
    .biz-location svg { width: 11px; height: 11px; stroke: var(--text-muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    /* ── Divider ── */
    .divider {
      width: 100%; height: 1px;
      background: linear-gradient(to right, transparent, rgba(59,155,122,0.12), transparent);
      margin: 4px 0 24px;
    }

    /* ── Stars ── */
    .section-label {
      text-align: center;
      font-size: 17px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 16px;
      letter-spacing: -0.1px;
    }
    .stars {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 4px 0 20px;
    }
    .star-btn {
      background: none; border: none; cursor: pointer;
      padding: 8px; position: relative;
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent; outline: none;
      border-radius: 50%;
    }
    .star-btn:active { transform: scale(0.88); }
    .star-btn svg {
      width: 38px; height: 38px; display: block;
      transition: fill 0.25s, stroke 0.25s, transform 0.2s;
    }
    .star-btn.filled svg {
      fill: #F5C542; stroke: #F5C542;
      filter: drop-shadow(0 2px 6px rgba(245,197,66,0.4));
    }
    .star-btn:not(.filled) svg { fill: transparent; stroke: #D0D0D0; }
    .star-btn.filled:hover svg { transform: scale(1.12); }
    .star-pulse {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1.5px solid rgba(245,197,66,0.6);
      animation: starPulse 0.7s ease-out forwards; pointer-events: none;
    }
    @keyframes starPulse {
      from { opacity: 0.8; transform: scale(0.6); }
      to   { opacity: 0; transform: scale(2.2); }
    }

    /* ── Tags ── */
    .tags-section {
      display: none;
      flex-direction: column;
      gap: 16px;
      padding-top: 4px;
      animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }
    .tags-section.visible { display: flex; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tags-label {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: -4px;
    }
    .tags-label.negative { color: #E57373; }

    .tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-family: 'Onest', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .tag:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
    .tag.selected-pos {
      background: var(--green-light);
      border-color: var(--green);
      color: var(--green);
      font-weight: 500;
    }
    .tag.selected-neg {
      background: rgba(239,68,68,0.07);
      border-color: rgba(239,68,68,0.4);
      color: #DC2626;
      font-weight: 500;
    }
    .tag:active { transform: scale(0.95); }

    /* ── Review box ── */
    .review-box {
      display: none;
      flex-direction: column;
      gap: 0;
      margin-top: 8px;
      animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }
    .review-box.visible { display: flex; }

    .review-box-inner {
      position: relative;
      background: #F4F9FE;
      border: 1.5px solid rgba(59,155,122,0.18);
      border-radius: var(--radius-md);
      padding: 16px;
      min-height: 120px;
    }
    .review-text {
      font-size: 14px;
      line-height: 1.75;
      color: var(--text-secondary);
      font-weight: 300;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .review-text.editable {
      outline: none;
      border: none;
      background: transparent;
      width: 100%;
      resize: none;
      font-family: 'Onest', sans-serif;
      font-size: 14px;
      line-height: 1.75;
      color: var(--text-secondary);
      font-weight: 300;
      min-height: 90px;
    }
    .cursor-blink {
      display: inline-block;
      width: 2px; height: 14px;
      background: var(--green);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    .review-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
    }
    .edit-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'Onest', sans-serif;
      font-size: 12px; font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .edit-btn:hover { border-color: var(--green); color: var(--green); }
    .edit-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .edit-btn.active { background: var(--green-light); border-color: var(--green); color: var(--green); }

    /* ── CTA Buttons ── */
    .cta-wrap {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
      animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    }
    .cta-wrap.visible { display: flex; }

    .btn-copy {
      width: 100%;
      padding: 14px 20px;
      border-radius: var(--radius-pill);
      background: linear-gradient(135deg, #3B9B7A, #2a7a5f);
      color: #fff;
      border: none;
      font-family: 'Onest', sans-serif;
      font-size: 15px; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 8px 24px rgba(59,155,122,0.3), 0 2px 8px rgba(59,155,122,0.15);
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.1px;
    }
    .btn-copy:hover { background: linear-gradient(135deg, #2D8567, #226350); box-shadow: 0 12px 32px rgba(59,155,122,0.35); transform: translateY(-1px); }
    .btn-copy:active { transform: scale(0.98) translateY(0); }
    .btn-copy svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-copy.copied { background: linear-gradient(135deg, #2a7a5f, #1d5e49); }

    .btn-share {
      width: 100%;
      padding: 12px 20px;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--green);
      border: 1.5px solid rgba(59,155,122,0.3);
      font-family: 'Onest', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-share:hover { background: var(--green-light); border-color: var(--green); }
    .btn-share:active { transform: scale(0.98); }
    .btn-share svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Footer ── */
    .card-footer {
      margin-top: 24px;
      text-align: center;
      padding-top: 20px;
      border-top: 1px solid rgba(59,155,122,0.07);
    }
    .card-footer p { font-size: 10px; color: #B0B0B0; text-transform: uppercase; letter-spacing: 0.14em; }

    /* ── Loading / Error ── */
    .loading-screen, .error-screen {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 24px;
      position: relative; z-index: 1;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 2.5px solid rgba(59,155,122,0.15);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Copied toast ── */
    .toast {
      position: fixed;
      bottom: 32px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: #1E1E1E;
      color: #fff;
      font-size: 13px; font-weight: 400;
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Analytics overlay ── */
    #analytics-overlay {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: #F0F6FD;
      flex-direction: column;
      animation: slideIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    #analytics-overlay.visible { display: flex; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .analytics-header {
      flex-shrink: 0; background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(59,155,122,0.1);
    }
    .analytics-header h2 { font-size: 18px; font-weight: 600; color: var(--text-primary); }
    .analytics-header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .close-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: #fff; border: 1px solid #e8e8e8;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .close-btn svg { width: 18px; height: 18px; stroke: #4A4A4A; fill: none; stroke-width: 2; stroke-linecap: round; }
    .analytics-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
    .a-card { background: #fff; border-radius: 20px; border: 1px solid rgba(59,155,122,0.1); overflow: hidden; }
    .a-section { padding: 24px; }
    .a-section + .a-section { border-top: 1px solid rgba(59,155,122,0.08); }
    .a-section-title { font-size: 10px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
    .avg-number { font-size: 64px; font-weight: 600; color: var(--text-primary); text-align: center; line-height: 1; }
    .avg-sub { color: var(--text-muted); font-size: 14px; text-align: center; margin-top: 6px; margin-bottom: 24px; }
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .stat-box { text-align: center; padding: 14px 8px; background: #F4F9FE; border: 1px solid rgba(59,155,122,0.1); border-radius: 12px; }
    .stat-val { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    .stat-val.green { color: var(--green); }
    .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
    .star-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .star-label { width: 28px; font-size: 12px; font-weight: 500; color: var(--text-secondary); flex-shrink: 0; }
    .bar-track { flex: 1; height: 28px; background: #F0F0F0; border-radius: 100px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 100px; width: 0; transition: width 0.8s ease; }
    .bar-5 { background: #3B9B7A; } .bar-4 { background: #5BA3CF; }
    .bar-3 { background: #F5C542; } .bar-2 { background: #F59E0B; } .bar-1 { background: #EF4444; }
    .bar-count { width: 60px; text-align: right; font-size: 12px; color: var(--text-primary); font-weight: 500; flex-shrink: 0; }
    .state-center { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; text-align: center; }
    .state-center p { color: var(--text-muted); }
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Loading -->
<div id="loading-screen" class="loading-screen">
  <div class="spinner"></div>
  <p style="color:#9A9A9A;font-size:14px;">Loading...</p>
</div>

<!-- Error -->
<div id="error-screen" class="error-screen" style="display:none;">
  <p style="font-size:17px;color:#8A8A8A;margin-bottom:6px;">Business not found</p>
  <p style="font-size:13px;color:#A0A0A0;">Please check the URL and try again</p>
</div>

<!-- Main -->
<main id="main-screen" style="display:none;">
  <div class="card" id="main-card">

    <!-- Business Header -->
    <div class="biz-header">
      <div class="biz-icon-wrap">
        <div class="biz-icon" id="biz-icon">
          <!-- icon injected by JS -->
        </div>
      </div>
      <h1 class="biz-name" id="biz-name">Loading...</h1>
      <div class="biz-location" id="biz-location" style="display:none;">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="biz-location-text"></span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Rating -->
    <div id="rating-area">
      <p class="section-label" id="section-label">How's your experience with us?</p>
      <div class="stars" id="stars-container"></div>

      <!-- Tags -->
      <div class="tags-section" id="tags-section">
        <div class="tags-label" id="pos-label">What did you love?</div>
        <div class="tags-wrap" id="pos-tags"></div>
        <div class="tags-label negative" id="neg-label" style="display:none;">Anything we can improve?</div>
        <div class="tags-wrap" id="neg-tags" style="display:none;"></div>
      </div>

      <!-- Review output -->
      <div class="review-box" id="review-box">
        <div class="review-box-inner">
          <div class="review-text" id="review-text"></div>
        </div>
        <div class="review-actions">
          <button class="edit-btn" id="edit-btn" onclick="toggleEdit()">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
        </div>
      </div>

      <!-- CTA -->
      <div class="cta-wrap" id="cta-wrap">
        <button class="btn-copy" id="btn-copy" onclick="copyAndReview()">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Copy & Open Google Review
        </button>
      </div>
    </div>

    <div class="card-footer">
      <p>Powered by StethBook</p>
    </div>
  </div>
</main>

<!-- Analytics -->
<div id="analytics-overlay">
  <div class="analytics-header">
    <div>
      <h2>Analytics</h2>
      <p id="analytics-total-label">0 reviews</p>
    </div>
    <button class="close-btn" onclick="closeAnalytics()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="analytics-body" id="analytics-body">
    <div class="state-center"><div class="spinner"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
var SUPABASE_URL = "https://api.stethbook.com";
var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrbXh3bnB5d2J0aWlkZGxrd2JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNjI2OTUsImV4cCI6MjA4NjgzODY5NX0.oazApsFBLjUbvCXZGZUEKW-7TepV9YKmG0nB2EdZOBg";

// ── MOCK DATA (fallback) ──
var MOCK_BUSINESS = {
  id: 'mock-001',
  business_name: 'Sunshine Clinic',
  location: 'Banjara Hills, Hyderabad',
  category: 'healthcare',
  gpage_url: 'https://g.page/r/demo',
  low_rating_threshold: 4

var MOCK_TAGS = {

    negative: ['Expensive', 'Long Queue', 'Too Noisy', 'Limited Seating']

};

// review variations: key = sorted tag combo (e.g. "Friendly Staff|Short Wait Time"), value = array of strings

  'Friendly Staff|Short Wait Time|Clean Facility': [

  ],
  'default_negative': [
    "Had a few concerns about my visit but the core care was decent enough.",
    "Room for improvement in a few areas, though the overall experience was passable.",
    "A mixed experience — some things worked well, others left me hoping for better next time."

};

// ── ICONS ──
var ICONS = {
  healthcare: '<svg viewBox="0 0 24 24"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg>',
  restaurant: '<svg viewBox="0 0 24 24"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>',
  cafe: '<svg viewBox="0 0 24 24"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>',
  default: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>'
};

// ── STATE ──
var business = null;
var currentRating = 0;
var selectedPosTags = [];
var selectedNegTags = [];
var allPosTags = [];
var allNegTags = [];
var reviewText = '';
var isTyping = false;
var typingTimer = null;
var isEditing = false;
var tapCount = 0;
var tapTimer = null;
var analyticsLoaded = false;
var reviewsData = [];

// ── HELPERS ──
function apiFetch(url, opts) {
  var headers = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY };
  if (opts && opts.method && opts.method !== 'GET') {
    headers['Content-Type'] = 'application/json';
    headers['Prefer'] = 'return=representation';
  }
  return fetch(url, Object.assign({ headers: headers }, opts || {}));
}

function getBusinessCode() {
  return window.location.pathname.replace(/^\//, '').trim() || 'demo';
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

// ── INIT ──
async function init() {
  try {
    var code = getBusinessCode();
    var res = await apiFetch(SUPABASE_URL + '/rest/v1/businesses?business_code=eq.' + code + '&status=eq.active&select=*');
    var data = await res.json();
    business = data.length ? data[0] : null;
  } catch(e) {
    business = null;
  }

  // Fall back to mock
  if (!business) business = MOCK_BUSINESS;

  // Render header
  document.getElementById('biz-name').textContent = business.business_name;
  if (business.location) {
    document.getElementById('biz-location-text').textContent = business.location;
    document.getElementById('biz-location').style.display = 'flex';
  }
  var cat = (business.category || 'default').toLowerCase();
  document.getElementById('biz-icon').innerHTML = ICONS[cat] || ICONS['default'];

  buildStars();

  document.getElementById('main-card').addEventListener('click', handleCardTap);
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'flex';
}

// ── STARS ──
function buildStars() {
  var container = document.getElementById('stars-container');
  container.innerHTML = '';
  for (var i = 1; i <= 5; i++) {
    var btn = document.createElement('button');
    btn.className = 'star-btn';
    btn.setAttribute('data-star', i);
    btn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      handleRate(parseInt(this.getAttribute('data-star')));
    });
    container.appendChild(btn);
  }
}

function updateStars(rating) {
  document.querySelectorAll('.star-btn').forEach(function(b) {
    parseInt(b.getAttribute('data-star')) <= rating ? b.classList.add('filled') : b.classList.remove('filled');
  });
}

function addStarPulse(idx) {
  var btn = document.querySelector('[data-star="' + idx + '"]');
  if (!btn) return;
  var p = document.createElement('div'); p.className = 'star-pulse';
  btn.appendChild(p);
  setTimeout(function() { p.remove(); }, 700);
}

function handleRate(value) {
  currentRating = value;
  updateStars(value);
  addStarPulse(value);
  selectedPosTags = [];
  selectedNegTags = [];
  buildTags(value);
  document.getElementById('review-box').classList.remove('visible');
  document.getElementById('cta-wrap').classList.remove('visible');
  document.getElementById('review-text').textContent = '';
  reviewText = '';
}

// ── TAGS ──
function buildTags(rating) {
  var cat = (business.category || 'healthcare').toLowerCase();
  var tagSet = MOCK_TAGS[cat] || MOCK_TAGS['healthcare'];

  // Determine positive/negative count based on rating
  // 5★: 7pos 0neg | 4★: 6pos 1neg | 3★: 4pos 2neg | 2★: 2pos 3neg | 1★: 0pos 4neg
  var posCount, negCount;
  if (rating === 5)      { posCount = 7; negCount = 0; }
  else if (rating === 4) { posCount = 6; negCount = 1; }
  else if (rating === 3) { posCount = 4; negCount = 2; }
  else if (rating === 2) { posCount = 2; negCount = 3; }
  else                   { posCount = 0; negCount = 4; }

  allPosTags = shuffle(tagSet.positive).slice(0, posCount);
  allNegTags = shuffle(tagSet.negative).slice(0, negCount);

  var posWrap = document.getElementById('pos-tags');
  var negWrap = document.getElementById('neg-tags');
  posWrap.innerHTML = '';
  negWrap.innerHTML = '';

  allPosTags.forEach(function(tag) {
    posWrap.appendChild(makeTag(tag, 'pos'));
  });
  allNegTags.forEach(function(tag) {
    negWrap.appendChild(makeTag(tag, 'neg'));
  });

  var section = document.getElementById('tags-section');
  var negLabel = document.getElementById('neg-label');
  var negTagsEl = document.getElementById('neg-tags');

  if (allNegTags.length > 0) {
    negLabel.style.display = 'block';
    negTagsEl.style.display = 'flex';
  } else {
    negLabel.style.display = 'none';
    negTagsEl.style.display = 'none';
  }

  if (allPosTags.length === 0) {
    document.getElementById('pos-label').style.display = 'none';
    posWrap.style.display = 'none';
  } else {
    document.getElementById('pos-label').style.display = 'block';
    posWrap.style.display = 'flex';
  }

  section.classList.add('visible');
}

function makeTag(label, type) {
  var btn = document.createElement('button');
  btn.className = 'tag';
  btn.textContent = label;
  btn.setAttribute('data-tag', label);
  btn.setAttribute('data-type', type);
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleTag(this, label, type);
  });
  return btn;
}

function toggleTag(el, label, type) {
  if (type === 'pos') {
    var idx = selectedPosTags.indexOf(label);
    if (idx > -1) { selectedPosTags.splice(idx, 1); el.classList.remove('selected-pos'); }
    else { selectedPosTags.push(label); el.classList.add('selected-pos'); }
  } else {
    var idx2 = selectedNegTags.indexOf(label);
    if (idx2 > -1) { selectedNegTags.splice(idx2, 1); el.classList.remove('selected-neg'); }
    else { selectedNegTags.push(label); el.classList.add('selected-neg'); }
  }
  generateReview();
}

// ── REVIEW GENERATION ──
function getReviewKey(posTags, negTags) {
  // Try exact combination first (pos tags sorted)
  var sortedPos = posTags.slice().sort();
  if (sortedPos.length > 0) {
    var key = sortedPos.join('|');
    if (MOCK_REVIEWS[key]) return key;
  }
  // Fall back to individual tag
  if (sortedPos.length > 0 && MOCK_REVIEWS[sortedPos[0]]) return sortedPos[0];
  // Fall back to negative
  if (negTags.length > 0 && MOCK_REVIEWS[negTags[0]]) return negTags[0];
  // Default
  return posTags.length > 0 ? 'default_positive' : 'default_negative';
}

function generateReview() {
  var totalSelected = selectedPosTags.length + selectedNegTags.length;
  if (totalSelected === 0) {
    document.getElementById('review-box').classList.remove('visible');
    document.getElementById('cta-wrap').classList.remove('visible');
    reviewText = '';
    return;
  }

  var key = getReviewKey(selectedPosTags, selectedNegTags);
  var variations = MOCK_REVIEWS[key] || MOCK_REVIEWS['default_positive'];
  var chosen = pick(variations);

  // Stop any current typing
  if (typingTimer) clearTimeout(typingTimer);
  isTyping = false;

  // Exit edit mode
  if (isEditing) exitEdit();

  reviewText = chosen;
  typeReview(chosen);
}

function typeReview(text) {
  var el = document.getElementById('review-text');
  var box = document.getElementById('review-box');
  var cta = document.getElementById('cta-wrap');

  box.classList.add('visible');
  cta.classList.remove('visible');
  el.textContent = '';
  isTyping = true;

  var i = 0;
  var cursor = document.createElement('span');
  cursor.className = 'cursor-blink';
  el.appendChild(cursor);

  function type() {
    if (!isTyping) return;
    if (i < text.length) {
      el.insertBefore(document.createTextNode(text[i]), cursor);
      i++;
      typingTimer = setTimeout(type, 22 + Math.random() * 18);
    } else {
      cursor.remove();
      isTyping = false;
      cta.classList.add('visible');
      // Track review generation
      trackEvent('review_generated');
    }
  }
  type();
}

// ── EDIT ──
function toggleEdit() {
  if (isEditing) { exitEdit(); }
  else { enterEdit(); }
}

function enterEdit() {
  isEditing = true;
  var el = document.getElementById('review-text');
  var btn = document.getElementById('edit-btn');
  var current = el.textContent || reviewText;

  // Replace div with textarea
  var ta = document.createElement('textarea');
  ta.className = 'review-text editable';
  ta.value = current;
  ta.id = 'review-textarea';
  el.parentNode.replaceChild(ta, el);

  btn.classList.add('active');
  btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Done';
  ta.focus();
  ta.addEventListener('input', function() { reviewText = this.value; });
}

function exitEdit() {
  isEditing = false;
  var ta = document.getElementById('review-textarea');
  var btn = document.getElementById('edit-btn');
  if (!ta) return;
  reviewText = ta.value;

  var div = document.createElement('div');
  div.className = 'review-text';
  div.id = 'review-text';
  div.textContent = reviewText;
  ta.parentNode.replaceChild(div, ta);

  btn.classList.remove('active');
  btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit';
}

// ── COPY & REVIEW ──
function copyAndReview() {
  if (!reviewText) return;
  var btn = document.getElementById('btn-copy');

  // Copy
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(reviewText).catch(function() { fallbackCopy(reviewText); });
  } else {
    fallbackCopy(reviewText);
  }

  showToast('Copied! Opening Google Review…');
  btn.classList.add('copied');
  btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" stroke="#fff" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied!';

  // Track
  trackEvent('review_copied');

  // Open Google review link
  setTimeout(function() {
    var url = business.gpage_url || 'https://search.google.com/local/writereview';
    window.open(url, '_blank');
    setTimeout(function() {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Copy & Open Google Review';
    }, 2000);
  }, 800);
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

// ── TRACKING ──
function trackEvent(event) {
  if (!business || business.id === 'mock-001') return;
  var payload = { business_id: business.id, event: event };
  apiFetch(SUPABASE_URL + '/rest/v1/review_events', {
    method: 'POST',
    body: JSON.stringify(payload)
  }).catch(function() {});
}

// ── TRIPLE TAP ANALYTICS ──
function handleCardTap() {
  tapCount++;
  if (tapTimer) clearTimeout(tapTimer);
  if (tapCount >= 3) { tapCount = 0; openAnalytics(); return; }
  tapTimer = setTimeout(function() { tapCount = 0; }, 500);
}

// ── ANALYTICS ──
function openAnalytics() {
  document.getElementById('analytics-overlay').classList.add('visible');
  if (!analyticsLoaded) loadAnalytics();
}

function closeAnalytics() {
  document.getElementById('analytics-overlay').classList.remove('visible');
}

async function loadAnalytics() {
  analyticsLoaded = true;
  try {
    var res = await apiFetch(SUPABASE_URL + '/rest/v1/reviews?business_id=eq.' + business.id + '&select=*&order=created_at.desc');
    reviewsData = await res.json();
  } catch(e) { reviewsData = []; }

  document.getElementById('analytics-total-label').textContent = reviewsData.length + ' reviews';
  renderAnalytics();
}

function renderAnalytics() {
  var body = document.getElementById('analytics-body');
  var total = reviewsData.length;

  if (total === 0) {
    body.innerHTML = '<div class="state-center"><p>No data yet</p></div>';
    return;
  }

  var avg = (reviewsData.reduce(function(s,r){ return s + r.rating; }, 0) / total).toFixed(1);
  var satisfaction = Math.round(reviewsData.filter(function(r){ return r.rating >= 4; }).length / total * 100);

  var starRows = '';
  [5,4,3,2,1].forEach(function(s) {
    var count = reviewsData.filter(function(r){ return r.rating === s; }).length;
    var pct = total > 0 ? Math.round(count/total*100) : 0;
    starRows += '<div class="star-row"><div class="star-label">' + s + '★</div><div class="bar-track"><div class="bar-fill bar-' + s + '" style="width:' + pct + '%"></div></div><div class="bar-count">' + count + '</div></div>';
  });

  body.innerHTML =
    '<div class="a-card">' +
      '<div class="a-section">' +
        '<div class="a-section-title">Average Rating</div>' +
        '<div class="avg-number">' + avg + '</div>' +
        '<div class="avg-sub">out of 5</div>' +
        '<div class="stats-row">' +
          '<div class="stat-box"><div class="stat-val">' + total + '</div><div class="stat-label">Total</div></div>' +
          '<div class="stat-box"><div class="stat-val green">' + satisfaction + '%</div><div class="stat-label">Satisfied</div></div>' +
          '<div class="stat-box"><div class="stat-val">' + avg + '</div><div class="stat-label">Avg Stars</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="a-section">' +
        '<div class="a-section-title">Rating Distribution</div>' +
        starRows +
      '</div>' +
    '</div>';
}

// ── START ──
init();
</script>
